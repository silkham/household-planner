<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0A0D11" />
<title>Household Planner</title>
<link rel="manifest" href="manifest.webmanifest" />

<!-- Fonts: Fraunces (headings) + Inter Tight (body/UI) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
/* ============================================================= *
 *  Design tokens — "living money-app". Dark-first + full light. *
 * ============================================================= */
:root {
  --font-head: "Fraunces", Georgia, serif;
  --font-body: "Inter Tight", system-ui, sans-serif;

  --ease: cubic-bezier(.22,.6,.36,1);
  --dur-1: 180ms; --dur-2: 240ms; --dur-3: 360ms;

  --r-card: 16px; --r-ctrl: 10px;
}

/* ---- Dark (default) ---- */
html[data-theme="dark"] {
  --base:        #0A0D11;
  --text:        #EAF0F2;
  --text-dim:    #8B98A2;
  --text-faint:  #5A6771;

  --card:        rgba(20,27,34,.5);
  --card-solid:  #141B22;
  --card-top:    inset 0 1px 0 rgba(255,255,255,.05);
  --hairline:    rgba(255,255,255,.07);
  --shadow:      0 10px 30px rgba(0,0,0,.35);

  --mint:   #34E0A1;
  --coral:  #FF6B5A;
  --amber:  #FFA24B;
  --violet: #7B5CFF;
  --blue:   #2B8BFF;

  --person-lachlan: #6C8Cff;   /* indigo/blue */
  --person-christine: #FF6B5A; /* coral */

  --aurora-blend: screen;
  --aurora-op: .32;
  --nav-bg: rgba(12,16,20,.62);
}

/* ---- Light ---- */
html[data-theme="light"] {
  --base:        #F6F8F6;
  --text:        #16201B;
  --text-dim:    #566A5F;
  --text-faint:  #8A9B92;

  --card:        #FFFFFF;
  --card-solid:  #FFFFFF;
  --card-top:    none;
  --hairline:    #E4E7E3;
  --shadow:      0 2px 10px rgba(27,38,32,.05);

  --mint:   #12A66E;
  --coral:  #E5533D;
  --amber:  #C9820F;
  --violet: #6B4FE0;
  --blue:   #2472D6;

  --person-lachlan: #4F5FE0;
  --person-christine: #E5533D;

  --aurora-blend: normal;
  --aurora-op: .40;
  --nav-bg: rgba(255,255,255,.72);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
body {
  margin: 0;
  font-family: var(--font-body);
  background: var(--base);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  /* App-like feel: no double-tap zoom, no rubber-band scroll past the edges. */
  touch-action: manipulation;
  overscroll-behavior: none;
  max-width: 100%;
}
h1,h2,h3,.font-head { font-family: var(--font-head); font-weight: 500; letter-spacing: -.01em; }

/* ============================================================= *
 *  Aurora background — three drifting blobs + contour texture.  *
 * ============================================================= */
.aurora {
  position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
}
.aurora .blob {
  position: absolute; border-radius: 50%;
  filter: blur(70px); mix-blend-mode: var(--aurora-blend); opacity: var(--aurora-op);
}
html[data-theme="light"] .aurora .blob { filter: blur(90px); }
.blob.mint   { width: 46vw; height: 46vw; background: radial-gradient(circle, var(--mint), transparent 70%);
               top: -8vw; left: -6vw; animation: drift1 18s var(--ease) infinite alternate; }
.blob.violet { width: 42vw; height: 42vw; background: radial-gradient(circle, var(--violet), transparent 70%);
               top: 30vh; right: -8vw; animation: drift2 22s var(--ease) infinite alternate; }
.blob.blue   { width: 40vw; height: 40vw; background: radial-gradient(circle, var(--blue), transparent 70%);
               bottom: -10vw; left: 25vw; animation: drift3 16s var(--ease) infinite alternate; }
.aurora .contour {
  position: absolute; inset: 0; opacity: .5;
  background: repeating-radial-gradient(circle at 60% 40%,
              transparent 0, transparent 38px, var(--hairline) 39px, transparent 40px);
}
@keyframes drift1 { to { transform: translate(6vw, 5vh) scale(1.1); } }
@keyframes drift2 { to { transform: translate(-5vw, -4vh) scale(1.08); } }
@keyframes drift3 { to { transform: translate(4vw, -6vh) scale(1.12); } }

/* ============================================================= *
 *  Surfaces                                                     *
 * ============================================================= */
.glass {
  background: var(--card);
  border: 1px solid var(--hairline);
  box-shadow: var(--card-top), var(--shadow);
  border-radius: var(--r-card);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.chip {
  background: var(--nav-bg);
  border: 1px solid var(--hairline);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

/* ============================================================= *
 *  Layout frame                                                *
 * ============================================================= */
#app { position: relative; z-index: 1; min-height: 100dvh; display: flex; flex-direction: column; }

.appbar {
  position: sticky; top: 0; z-index: 20;
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px calc(14px + env(safe-area-inset-top, 0px));
  padding-top: max(14px, env(safe-area-inset-top, 0px));
  background: var(--nav-bg);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--hairline);
}
.wordmark { font-family: var(--font-head); font-weight: 600; font-size: 19px; letter-spacing: -.02em; }
.wordmark .accent { color: var(--mint); }
.iconbtn {
  width: 38px; height: 38px; display: grid; place-items: center;
  border-radius: var(--r-ctrl); border: 1px solid var(--hairline);
  background: transparent; color: var(--text-dim); cursor: pointer;
  transition: color var(--dur-1) var(--ease), border-color var(--dur-1) var(--ease), transform var(--dur-1) var(--ease);
}
.iconbtn:hover { color: var(--text); border-color: var(--mint); }
.iconbtn:active { transform: scale(.94); }
.iconbtn svg { width: 19px; height: 19px; }

/* main + nav container */
.shell { flex: 1; display: flex; width: 100%; max-width: 1200px; margin: 0 auto; }

/* desktop sidebar (hidden on mobile) */
.sidebar { display: none; }

main { flex: 1; padding: 20px 18px 108px; }
@media (min-width: 860px) {
  main { padding: 28px 28px 40px; }
  .shell { gap: 8px; }
  .sidebar {
    display: flex; flex-direction: column; gap: 6px;
    width: 210px; padding: 22px 12px; position: sticky; top: 70px; align-self: flex-start;
  }
  .bottomnav { display: none !important; }
}

/* nav items */
.navitem {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px; border-radius: var(--r-ctrl);
  color: var(--text-dim); cursor: pointer; font-weight: 500; font-size: 14.5px;
  border: 1px solid transparent;
  transition: all var(--dur-1) var(--ease);
}
.navitem svg { width: 20px; height: 20px; }
.navitem:hover { color: var(--text); background: var(--card); }
.navitem.active { color: var(--text); background: var(--card); border-color: var(--hairline); box-shadow: var(--card-top); }
.navitem.active svg { color: var(--mint); }

/* bottom nav (mobile) */
.bottomnav {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
  display: flex; justify-content: space-around; align-items: center;
  padding: 8px 8px calc(8px + env(safe-area-inset-bottom, 0px));
  background: var(--nav-bg); border-top: 1px solid var(--hairline);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
}
.bnitem {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  color: var(--text-faint); font-size: 11px; font-weight: 500; cursor: pointer;
  padding: 4px 14px; border-radius: 10px; transition: color var(--dur-1) var(--ease);
}
.bnitem svg { width: 22px; height: 22px; }
.bnitem.active { color: var(--text); }
.bnitem.active svg { color: var(--mint); }

/* ============================================================= *
 *  Motion kit                                                  *
 * ============================================================= */
@keyframes cardSettle { from { opacity: 0; transform: translateY(9px); } to { opacity: 1; transform: none; } }
.screen.active > * { animation: cardSettle var(--dur-3) var(--ease) both; }
.screen.active > *:nth-child(2){ animation-delay: .06s; }
.screen.active > *:nth-child(3){ animation-delay: .12s; }
.screen.active > *:nth-child(4){ animation-delay: .18s; }

.screen { display: none; }
.screen.active { display: block; }

/* chart draw-on: line strokes itself in, then the area fill fades up */
@keyframes sparkDraw { from { stroke-dashoffset: 1000; } to { stroke-dashoffset: 0; } }
@keyframes areaFade { from { opacity: 0; } to { opacity: 1; } }
@keyframes pulseHalo { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
.spark-line { stroke-dasharray: 1000; animation: sparkDraw 1.3s var(--ease) forwards; }
.spark-area { opacity: 0; animation: areaFade .6s var(--ease) .7s forwards; }
.pt-danger { animation: pulseHalo 1.6s var(--ease) infinite; }

@media (prefers-reduced-motion: reduce) {
  .aurora .blob { animation: none !important; }
  .screen.active > * { animation: none !important; }
  .spark-line, .spark-area, .pt-danger { animation: none !important; stroke-dashoffset: 0 !important; opacity: 1 !important; }
  .sp-barfill { animation: none !important; transform: none !important; }
  * { scroll-behavior: auto !important; }
}

/* ============================================================= *
 *  Auth gate                                                   *
 * ============================================================= */
#gate {
  position: fixed; inset: 0; z-index: 50; display: grid; place-items: center;
  padding: 24px; background: var(--base);
}
.authcard { width: 100%; max-width: 380px; padding: 30px 26px; text-align: center; }
.field {
  width: 100%; padding: 13px 14px; margin-top: 14px;
  background: var(--card-solid); color: var(--text);
  border: 1px solid var(--hairline); border-radius: var(--r-ctrl);
  font-family: var(--font-body); font-size: 15px; outline: none;
  transition: border-color var(--dur-1) var(--ease);
}
.field:focus { border-color: var(--mint); }
.btn {
  width: 100%; padding: 13px 16px; margin-top: 14px; cursor: pointer;
  border: none; border-radius: var(--r-ctrl);
  font-family: var(--font-body); font-weight: 600; font-size: 15px;
  background: var(--mint); color: #04120C;
  transition: transform var(--dur-1) var(--ease), opacity var(--dur-1) var(--ease);
}
.btn:hover { opacity: .92; }
.btn:active { transform: scale(.98); }
.btn[disabled] { opacity: .5; cursor: default; }
.muted { color: var(--text-dim); font-size: 13.5px; line-height: 1.55; }

/* placeholder tiles for empty screens */
.tile { padding: 22px; margin-bottom: 14px; }
.tile h2 { font-size: 21px; margin: 0 0 4px; }
.eyebrow { font-size: 11.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--mint); font-weight: 600; }
.pending { display: inline-flex; align-items: center; gap: 6px; margin-top: 12px; font-size: 12.5px;
           color: var(--text-faint); border: 1px dashed var(--hairline); padding: 5px 10px; border-radius: 999px; }
.hpill { display:inline-block; padding:2px 9px; border-radius:999px; font-size:11.5px; font-weight:600; }

/* ============================================================= *
 *  Finances — sections + cards                                 *
 * ============================================================= */
.fsection { margin-bottom: 26px; }
.sec-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
.sec-head > div:first-child { flex: 1; }
.sec-sub { margin: 3px 0 0; font-size: 12.5px; color: var(--text-dim); line-height: 1.4; }
.sec-totals { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.sec-add {
  width: 34px; height: 34px; flex: none; display: grid; place-items: center;
  border-radius: 10px; border: 1px solid var(--hairline); background: var(--card);
  color: var(--mint); cursor: pointer; transition: transform var(--dur-1) var(--ease), border-color var(--dur-1) var(--ease);
}
.sec-add:hover { border-color: var(--mint); }
.sec-add:active { transform: scale(.92); }
.sec-add svg { width: 18px; height: 18px; }
.sec-actions { display: flex; align-items: center; gap: 8px; flex: none; }
.sec-sync {
  display: inline-flex; align-items: center; gap: 6px; height: 34px; padding: 0 12px;
  border-radius: 10px; border: 1px solid var(--hairline); background: var(--card);
  color: var(--violet); font: inherit; font-size: 12.5px; font-weight: 500; cursor: pointer;
  transition: transform var(--dur-1) var(--ease), border-color var(--dur-1) var(--ease);
}
.sec-sync:hover { border-color: var(--violet); }
.sec-sync:active { transform: scale(.96); }
.sec-sync:disabled { opacity: .6; cursor: default; }
.sec-sync svg { width: 15px; height: 15px; }
.sec-sync[disabled] svg { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.sec-body { display: flex; flex-direction: column; gap: 8px; }
.fc-group-label { display: flex; align-items: baseline; justify-content: space-between;
  font-size: 11px; letter-spacing: .07em; text-transform: uppercase; font-weight: 600;
  color: var(--text-faint); margin-top: 6px; }
.fc-group-label:first-child { margin-top: 0; }
.fc-group-total { font-size: 12.5px; letter-spacing: 0; text-transform: none; color: var(--text-dim); }
.sec-empty { padding: 16px; border: 1px dashed var(--hairline); border-radius: var(--r-card);
             color: var(--text-dim); font-size: 13px; line-height: 1.5; }

.fcard {
  display: flex; align-items: center; gap: 12px; padding: 13px 15px;
  background: var(--card); border: 1px solid var(--hairline);
  box-shadow: var(--card-top), var(--shadow); border-radius: var(--r-card);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  cursor: pointer; transition: transform var(--dur-1) var(--ease), border-color var(--dur-1) var(--ease);
}
.fcard:hover { border-color: color-mix(in srgb, var(--mint) 40%, var(--hairline)); }
.fcard:active { transform: scale(.995); }
.fcard.fc-alert { border-color: color-mix(in srgb, var(--violet) 45%, var(--hairline)); }
.fc-main { flex: 1; min-width: 0; }
.fc-name { font-weight: 600; font-size: 14.5px; }
.fc-sub { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 5px; }
.fc-dim { color: var(--text-faint); font-size: 12px; }
.fc-amt { font-family: var(--font-head); font-weight: 500; font-size: 16px; white-space: nowrap; }
/* compact row (recurring flows) — dense single line */
.fcard.compact { padding: 8px 13px; gap: 8px; }
.fcard.compact .fc-name { flex: 1; min-width: 0; font-size: 13.5px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fcard.compact .fc-catmini { font-size: 11px; color: var(--text-faint); white-space: nowrap; }
.fcard.compact .fc-meta { font-size: 11px; color: var(--text-faint); white-space: nowrap; }
.fcard.compact .fc-amt { font-size: 14.5px; }
.fc-nudge { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; color: var(--amber); }
.fc-nudge svg { width: 12px; height: 12px; }
.fc-cta {
  padding: 6px 13px; border-radius: 999px; border: none; cursor: pointer;
  background: var(--violet); color: #fff; font-family: var(--font-body); font-weight: 600; font-size: 12.5px;
}
@media (min-width: 860px) {
  #finances-root { column-count: 2; column-gap: 20px; }
  .fsection { break-inside: avoid; }
}

/* ============================================================= *
 *  Projects tab                                                 *
 * ============================================================= */
.p-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
.sec-sub { margin: 3px 0 0; color: var(--text-faint); font-size: 12.5px; line-height: 1.45; }
.p-sort { max-width: 340px; margin-bottom: 14px; }
.p-list { display: flex; flex-direction: column; gap: 10px; }
.pcard { align-items: flex-start; gap: 12px; }
.pc-tick { flex: none; padding-top: 2px; }
.pc-tick svg { width: 22px; height: 22px; }
.pc-top { display: flex; align-items: center; gap: 8px; }
.pc-score {
  flex: none; font-family: var(--font-head); font-weight: 500; font-size: 12.5px;
  min-width: 26px; height: 22px; padding: 0 7px; display: inline-flex; align-items: center; justify-content: center;
  border-radius: 999px; background: color-mix(in srgb, var(--violet) 16%, transparent); color: var(--violet);
}
.dur-bar { display: flex; gap: 3px; margin-top: 8px; }
.dur-bar span { width: 16px; height: 4px; border-radius: 2px; background: color-mix(in srgb, var(--blue) 40%, var(--hairline)); }
@media (min-width: 860px) { .p-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; } }

/* projects-tab dashboard summary */
.pdash { padding: 14px 16px; margin-bottom: 14px; }
.pdash-stats { display: flex; gap: 10px; }
.pdash-stat { flex: 1; }
.pdash-l { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-faint); margin-bottom: 3px; }
.pdash-v { font-family: var(--font-head); font-weight: 500; font-size: 18px; font-variant-numeric: tabular-nums; }
.pdash-fund { margin-top: 12px; }
.pdash-bar { height: 7px; border-radius: 5px; background: var(--hairline); overflow: hidden; }
.pdash-bar > i { display: block; height: 100%; border-radius: 5px; transition: width var(--dur-2) var(--ease); }
.pdash-note { font-size: 12.5px; margin-top: 6px; }
/* per-card spend progress */
.pc-prog { margin-top: 8px; }
.pc-progbar { height: 5px; border-radius: 3px; background: var(--hairline); overflow: hidden; }
.pc-progbar > i { display: block; height: 100%; border-radius: 3px; }
.pc-progtxt { display: block; font-size: 11.5px; color: var(--text-dim); margin-top: 4px; font-variant-numeric: tabular-nums; }

/* detail sheet extras */
.sheet-extra { display: flex; flex-direction: column; margin-top: 6px; }
.pi-head { display: flex; align-items: baseline; justify-content: space-between; margin: 14px 0 8px; }
.pi-total { font-family: var(--font-head); font-weight: 500; font-size: 14px; color: var(--text-dim); }
.li-list { display: flex; flex-direction: column; gap: 6px; }
.li { display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 10px 12px; border: 1px solid var(--hairline); border-radius: var(--r-ctrl);
      background: var(--card); cursor: pointer; }
.li:hover { border-color: color-mix(in srgb, var(--mint) 40%, var(--hairline)); }
.li-name { font-weight: 600; font-size: 13.5px; }
.li-sub { display: block; margin-top: 4px; }
.li-nums { display: flex; align-items: baseline; gap: 8px; white-space: nowrap; }
.li-est { font-family: var(--font-head); font-weight: 500; font-size: 14px; }
.li-act { font-size: 12.5px; }
.pi-add, .pi-btn {
  margin-top: 10px; width: 100%; padding: 10px; border-radius: var(--r-ctrl); cursor: pointer;
  border: 1px dashed var(--hairline); background: none; color: var(--mint);
  font-family: var(--font-body); font-weight: 600; font-size: 13.5px;
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
}
.pi-add svg, .pi-btn svg { width: 16px; height: 16px; }
.pi-btn { border-style: solid; }
.pi-btn[disabled] { opacity: .55; cursor: not-allowed; }
.pi-btn.locked { color: var(--mint); border-color: color-mix(in srgb, var(--mint) 45%, var(--hairline));
                 background: color-mix(in srgb, var(--mint) 10%, transparent); }
.pi-var { margin-top: 14px; }
.pi-var-top { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
.pi-bar { height: 7px; border-radius: 4px; background: var(--hairline); overflow: hidden; }
.pi-bar span { display: block; height: 100%; transform-origin: left; transition: transform var(--dur-2) var(--ease); }
.sp-list { display: flex; flex-direction: column; gap: 6px; }
.sp-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.sp-row span { font-size: 13px; color: var(--text-dim); }
.sp-in { max-width: 140px; text-align: right; }

/* linked transactions (line-item sheet) */
.lx-list { display: flex; flex-direction: column; gap: 6px; }
.lx { display: flex; align-items: center; gap: 10px; padding: 9px 11px;
      border: 1px solid var(--hairline); border-radius: var(--r-ctrl); background: var(--card); }
.lx-main { flex: 1; min-width: 0; }
.lx-name { display: block; font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lx-date { display: block; font-size: 11.5px; color: var(--text-faint); margin-top: 2px; }
.lx-amt { font-family: var(--font-head); font-weight: 500; font-size: 13.5px; color: var(--coral); white-space: nowrap; }
.lx-del { flex: none; width: 28px; height: 28px; display: grid; place-items: center; cursor: pointer;
          border: 1px solid var(--hairline); border-radius: 8px; background: none; color: var(--text-faint); }
.lx-del svg { width: 15px; height: 15px; }
.lx-search { margin-top: 10px; }
.lx-results { display: flex; flex-direction: column; gap: 5px; margin-top: 6px; }
.lx-res { display: flex; align-items: center; gap: 10px; padding: 9px 11px; cursor: pointer; text-align: left;
          border: 1px solid var(--hairline); border-radius: var(--r-ctrl); background: var(--card);
          color: var(--text); font-family: var(--font-body); }

/* per-transaction link/move button + "linked elsewhere" tag */

/* ============================================================= *

.tk-gname { font-family: var(--font-head); font-weight: 500; font-size: 15px; }
.tk-gtot { font-size: 12.5px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
.tk-list { display: flex; flex-direction: column; gap: 6px; }
.tk-row { display: flex; align-items: center; gap: 10px; padding: 9px 12px;
          border: 1px solid var(--hairline); border-radius: var(--r-ctrl); background: var(--card); }
.tk-row.done .tk-name { text-decoration: line-through; color: var(--text-faint); }
.tk-tick { flex: none; background: none; border: none; cursor: pointer; color: var(--text-faint);

.tk-tick svg { width: 20px; height: 20px; }
.tk-main { flex: 1; min-width: 0; cursor: pointer; }
.tk-name { font-weight: 600; font-size: 13.5px; }
.tk-sub { display: flex; align-items: center; gap: 8px; margin-top: 4px; }

.tk-nums { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
.tk-est { font-family: var(--font-head); font-weight: 500; font-size: 14px; font-variant-numeric: tabular-nums; }
.tk-actin { width: 96px; padding: 7px 9px; margin: 0; text-align: right; font-size: 13px; }

/* ============================================================= *
 *  Forecast tab                                                 *
 * ============================================================= */
.cf-top { margin-bottom: 12px; }
.cf-scenario { max-width: 420px; margin-bottom: 14px; }
.cf-card { padding: 14px 10px 6px; margin-bottom: 14px; }
.cf-chart { width: 100%; height: auto; display: block; overflow: visible; }
.ax-lbl { font-family: var(--font-body); font-size: 10.5px; fill: var(--text-faint); }
.ax-lbl.buf { fill: var(--coral); }
.ax-lbl.low { fill: var(--text-dim); font-weight: 600; }
.cf-callout rect { fill: var(--card-solid); stroke: var(--hairline); filter: drop-shadow(0 2px 6px rgba(0,0,0,.25)); }
.cf-co-mon { font-family: var(--font-body); font-size: 10px; font-weight: 600; fill: var(--text-dim); }
.cf-co-val { font-family: var(--font-body); font-size: 12.5px; font-weight: 700; fill: var(--text);
  font-variant-numeric: tabular-nums; }

.cf-alerts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.cf-alert {
  display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; cursor: pointer;
  padding: 12px 14px; border-radius: var(--r-ctrl); font-family: var(--font-body); font-size: 13.5px;
  color: var(--text); background: color-mix(in srgb, var(--t) 9%, transparent);
  border: 1px solid color-mix(in srgb, var(--t) 28%, transparent);
  transition: transform var(--dur-1) var(--ease);
}
.cf-alert:active { transform: scale(.995); }
.cf-alert > i:first-child { width: 17px; height: 17px; color: var(--t); flex: none; }
.cf-alert span { flex: 1; }
.cf-alert b { font-weight: 700; }
.cf-alert .chev { width: 15px; height: 15px; color: var(--text-faint); flex: none; }

.cf-tablehead, .mr-head {
  display: grid; grid-template-columns: 1fr auto auto 20px; gap: 12px; align-items: center;
}
.cf-tablehead {
  padding: 0 14px 8px; font-size: 11px; letter-spacing: .06em; text-transform: uppercase;
  color: var(--text-faint); font-weight: 600;
}
.cf-tablehead span:nth-child(2), .cf-tablehead span:nth-child(3) { text-align: right; }
.cf-table { display: flex; flex-direction: column; gap: 6px; }
.mrow { border: 1px solid var(--hairline); border-radius: var(--r-ctrl); background: var(--card);
        overflow: hidden; transition: border-color var(--dur-1) var(--ease); }
.mrow.below { border-color: color-mix(in srgb, var(--amber) 45%, var(--hairline)); }
.mrow.neg { border-color: color-mix(in srgb, var(--coral) 55%, var(--hairline)); }
.mrow.flash { animation: rowFlash 1.4s var(--ease); }
@keyframes rowFlash { 0%,100% { box-shadow: none; } 30% { box-shadow: 0 0 0 2px var(--violet); } }
.mr-head { width: 100%; padding: 12px 14px; background: none; border: none; cursor: pointer;
           font-family: var(--font-body); color: var(--text); }
.mr-mon { font-weight: 600; font-size: 13.5px; }
.mr-net { text-align: right; font-size: 13px; font-variant-numeric: tabular-nums; }
.mr-cash { text-align: right; font-family: var(--font-head); font-weight: 500; font-size: 15px; font-variant-numeric: tabular-nums; }
.mr-chev { width: 16px; height: 16px; color: var(--text-faint); }
.mr-detail { padding: 2px 14px 14px; border-top: 1px solid var(--hairline); }
.mr-nums { display: flex; flex-wrap: wrap; gap: 4px 16px; margin: 10px 0 8px; font-size: 12.5px; color: var(--text-dim); }
.mr-nums b { font-weight: 600; }
.bd-grp { margin-top: 8px; }
.bd-h { font-size: 10.5px; letter-spacing: .07em; text-transform: uppercase; color: var(--text-faint); font-weight: 600; margin-bottom: 4px; }
.bd-row { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--text-dim); padding: 2px 0; }
.bd-row span:last-child { font-variant-numeric: tabular-nums; }
.bd-cat { border-bottom: 1px solid var(--hairline); }
.bd-cat:last-child { border-bottom: none; }
.bd-cathead { width: 100%; display: grid; grid-template-columns: 16px 1fr auto; align-items: center; gap: 8px;
  padding: 7px 0; background: none; border: none; cursor: pointer; font-family: var(--font-body); color: var(--text); }
.bd-chev { width: 15px; height: 15px; color: var(--text-faint); }
.bd-catname { text-align: left; font-size: 13px; font-weight: 500; }
.bd-catamt { font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--text-dim); }
.bd-lines { padding: 0 0 6px 24px; }
@media (min-width: 860px) { .cf-card { padding: 18px 16px 8px; } }

/* ============================================================= *
 *  Spending tab                                                 *
 * ============================================================= */
.sp-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
.sp-chart { width: 100%; height: auto; display: block; overflow: visible; }
.sp-barfill { animation: barGrow .5s var(--ease) forwards; }
@keyframes barGrow { from { transform: scaleY(0); } to { transform: scaleY(1); } }
/* "needs a category" prompt (strict categorisation backstop) */
.sp-uncat { padding: 14px 15px; border-radius: var(--r-card); margin-bottom: 14px;
  border: 1px solid color-mix(in srgb, var(--amber) 45%, transparent); }
.sp-uncat-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
.sp-uncat-title { font-family: var(--font-head); font-size: 15px; }
.sp-uncat-sub { font-size: 12.5px; color: var(--text-faint); margin-top: 2px; }
.sp-uncat-badge { flex: none; min-width: 26px; height: 26px; padding: 0 8px; border-radius: 13px;
  background: var(--amber); color: #1a1204; font-weight: 700; font-size: 13px;
  display: inline-flex; align-items: center; justify-content: center; }
.sp-uncat-row { display: flex; align-items: stretch; gap: 6px; margin-top: 6px; }
.sp-uncat-open { flex: 1; min-width: 0; display: flex; align-items: center; gap: 10px; padding: 9px 11px;
  border-radius: var(--r-ctrl); border: 1px solid var(--hairline); background: var(--card); cursor: pointer;
  text-align: left; color: var(--text); font-family: var(--font-body); }
.sp-uncat-name { flex: 1; min-width: 0; font-size: 13.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sp-uncat-meta { font-size: 12.5px; color: var(--text-faint); white-space: nowrap; flex: none; }
.sp-uncat-open i { width: 15px; height: 15px; color: var(--text-faint); flex: none; }
.sp-uncat-accept { flex: none; max-width: 42%; display: inline-flex; align-items: center; gap: 5px; padding: 0 11px;
  border-radius: var(--r-ctrl); cursor: pointer; font-family: var(--font-body); font-weight: 600; font-size: 12.5px;
  border: 1px solid color-mix(in srgb, var(--mint) 45%, transparent);
  background: color-mix(in srgb, var(--mint) 15%, transparent); color: var(--mint); }
.sp-uncat-accept i { width: 15px; height: 15px; flex: none; }
.sp-uncat-accept span { min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sp-uncat-accept:disabled { opacity: .5; }
.sp-uncat-more { font-size: 12px; color: var(--text-faint); margin-top: 8px; text-align: center; }
.sp-selhead { display: flex; align-items: baseline; justify-content: space-between; margin: 4px 2px 10px; }
.sp-selmon { font-family: var(--font-head); font-weight: 500; font-size: 16px; }
.sp-seltot { font-variant-numeric: tabular-nums; color: var(--text-dim); font-size: 13px; }
.sp-cats { display: flex; flex-direction: column; gap: 6px; }
.sp-catrow { border: 1px solid var(--hairline); border-radius: var(--r-ctrl); background: var(--card); overflow: hidden; }
.sp-cathead { width: 100%; display: grid; grid-template-columns: minmax(84px,1.1fr) 2fr auto 16px; align-items: center;
  gap: 10px; padding: 11px 14px; background: none; border: none; cursor: pointer; font-family: var(--font-body); color: var(--text); }
.sp-catname { text-align: left; font-weight: 600; font-size: 13.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sp-catbar { height: 6px; border-radius: 3px; background: color-mix(in srgb, var(--blue) 16%, transparent); overflow: hidden; }
.sp-catbar span { display: block; height: 100%; background: var(--blue); border-radius: 3px; transition: width var(--dur-2) var(--ease); }
.sp-catamt { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; font-size: 13.5px; }
.sp-chev { width: 16px; height: 16px; color: var(--text-faint); }
.sp-catbar.off { background: none; }
.sp-catrow.notcount { opacity: .72; border-style: dashed; }
.sp-catrow.notcount .sp-catname { color: var(--text-dim); font-weight: 500; }
.sp-catoff { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
  color: var(--text-faint); border: 1px solid var(--hairline); border-radius: 5px; padding: 1px 5px; margin-left: 6px; }
.sp-notcount-div { margin: 12px 2px 2px; font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .05em; color: var(--text-faint); }
/* ---- month "position" panel (actuals, forecast-row layout) ---- */
.sp-month { margin-top: 12px; padding: 16px 18px; border-radius: var(--r-card); }
.sp-pos { display: flex; align-items: baseline; justify-content: space-between; }
.sp-pos-mon { font-family: var(--font-head); font-weight: 500; font-size: 18px; }
.sp-pos-net { font-weight: 600; font-size: 16px; font-variant-numeric: tabular-nums; }
.sp-budget { font-size: 11px; font-weight: 600; color: var(--text-faint); margin-left: 8px; font-variant-numeric: tabular-nums; }
.sp-budget.over { color: var(--coral); }
.sp-month .bd-cat.notcount { opacity: .72; }
.sp-month .bd-cat.notcount .bd-catname { color: var(--text-dim); }
/* nested drill-down (General → sub-categories) — indent + de-emphasise so a
   child (Holiday, Groceries…) reads clearly below its parent, not as a sibling
   of the top-level recurring lines. */
.sp-month .bd-cat .bd-cat { border-bottom: none; padding-left: 22px; }
.sp-month .bd-cat .bd-cat .bd-cathead { padding: 5px 0; }
.sp-month .bd-cat .bd-cat .bd-catname { font-weight: 400; font-size: 12.5px; color: var(--text-dim); }
.sp-month .bd-cat .bd-cat .bd-catamt { font-weight: 500; color: var(--text-faint); }
.sp-month .bd-cat .bd-cat .bd-chev { width: 13px; height: 13px; }
.sp-catoff.invest { color: var(--violet); border-color: color-mix(in srgb, var(--violet) 40%, transparent); }
.sp-month .bd-cat.invest .bd-catname { color: var(--text); }
.sp-catoff.project { color: var(--amber); border-color: color-mix(in srgb, var(--amber) 40%, transparent); }
.sp-month .bd-cat.project .bd-catname { color: var(--text); }
.sp-tx { width: 100%; display: grid; grid-template-columns: 1fr auto auto 16px; align-items: center; gap: 10px;
  padding: 9px 14px; background: none; border: none; border-top: 1px solid var(--hairline); cursor: pointer;
  font-family: var(--font-body); color: var(--text-dim); }
.sp-tx:hover { background: color-mix(in srgb, var(--mint) 6%, transparent); }
.sp-tx-name { text-align: left; font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sp-tx-date { font-size: 11px; color: var(--text-faint); font-variant-numeric: tabular-nums; }
.sp-tx-amt { text-align: right; font-size: 12.5px; font-variant-numeric: tabular-nums; }
.sp-tx i { width: 14px; height: 14px; color: var(--text-faint); }
.sp-load { margin-top: 8px; padding: 9px 16px; border-radius: var(--r-ctrl); border: 1px solid var(--hairline);
  background: var(--card); color: var(--text); cursor: pointer; font-family: var(--font-body); }

/* ---- transaction search ---- */
.sp-search { position: relative; margin-bottom: 14px; }
.sp-search i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px; color: var(--text-faint); pointer-events: none; }
.sp-search input { width: 100%; box-sizing: border-box; padding: 11px 34px 11px 36px; border-radius: var(--r-ctrl);
  border: 1px solid var(--hairline); background: var(--card); color: var(--text); font-family: var(--font-body);
  font-size: 14px; }
.sp-search input:focus { outline: none; border-color: var(--violet); }
.sp-search .sp-srch-clr { position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  width: 24px; height: 24px; display: grid; place-items: center; border: none; background: none;
  color: var(--text-faint); cursor: pointer; border-radius: 12px; }
.sp-srch-res { border: 1px solid var(--hairline); border-radius: var(--r-card); background: var(--card);
  overflow: hidden; margin-bottom: 14px; }
.sp-srch-meta { font-size: 12px; color: var(--text-faint); padding: 9px 14px; border-bottom: 1px solid var(--hairline); }
.sp-sr { width: 100%; display: grid; grid-template-columns: 1fr auto auto auto 16px; align-items: center; gap: 10px;
  padding: 9px 14px; background: none; border: none; border-top: 1px solid var(--hairline); cursor: pointer;
  font-family: var(--font-body); color: var(--text-dim); text-align: left; }
.sp-sr:first-of-type { border-top: none; }
.sp-sr:hover { background: color-mix(in srgb, var(--mint) 6%, transparent); }
.sp-sr-name { min-width: 0; font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sp-sr-cat { font-size: 10.5px; padding: 2px 7px; border-radius: 9px; white-space: nowrap;
  background: color-mix(in srgb, var(--blue) 14%, transparent); color: var(--text-dim); }
.sp-sr-cat.off { background: color-mix(in srgb, var(--text-faint) 16%, transparent); }
.sp-sr-date { font-size: 11px; color: var(--text-faint); font-variant-numeric: tabular-nums; }
.sp-sr-amt { text-align: right; font-size: 12.5px; font-variant-numeric: tabular-nums; }
.sp-sr-amt.in { color: var(--mint); }
.sp-sr i { width: 14px; height: 14px; color: var(--text-faint); }

/* ---- Merchants tab (V2 step 3) ---- */
.mc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
.mc-viewseg, .mc-seg { display: inline-flex; padding: 3px; gap: 3px; border-radius: 999px;
  border: 1px solid var(--hairline); background: var(--card); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
.mc-viewseg { margin-bottom: 14px; }
.mc-viewseg button, .mc-seg button { border: none; background: none; cursor: pointer; font: inherit;
  font-size: 12.5px; font-weight: 500; color: var(--text-dim); padding: 6px 14px; border-radius: 999px;
  transition: color var(--dur-1) var(--ease), background var(--dur-1) var(--ease); }
.mc-seg button { padding: 5px 11px; font-size: 12px; }
.mc-viewseg button.on, .mc-seg button.on { color: var(--text); background: var(--card-solid); box-shadow: var(--card-top); }
.mc-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
.mc-catsel { flex: 1; min-width: 150px; }
.mc-search { position: relative; margin-bottom: 14px; }
.mc-search i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  width: 15px; height: 15px; color: var(--text-faint); pointer-events: none; }
.mc-search input { width: 100%; box-sizing: border-box; padding: 11px 34px 11px 36px; border-radius: var(--r-ctrl);
  border: 1px solid var(--hairline); background: var(--card-solid); color: var(--text); font: inherit; font-size: 14px; }
.mc-search input:focus { outline: none; border-color: var(--violet); }
.mc-search .mc-srch-clr { position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--text-faint); cursor: pointer; padding: 4px; display: flex; }
.mc-summary { font-size: 12px; color: var(--text-faint); margin-bottom: 8px; }
.mc-list { display: flex; flex-direction: column; border: 1px solid var(--hairline); border-radius: var(--r-card);
  background: var(--card); overflow: hidden; }
.mc-row { width: 100%; display: grid; grid-template-columns: minmax(0,1.3fr) auto 64px auto auto 34px;
  align-items: center; gap: 10px; padding: 11px 14px; border: none; border-top: 1px solid var(--hairline);
  background: none; color: var(--text); font: inherit; cursor: pointer; text-align: left; }
.mc-row:first-child { border-top: none; }
.mc-row:hover { background: color-mix(in srgb, var(--mint) 6%, transparent); }
.mc-name { min-width: 0; font-size: 13.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mc-cat { font-size: 10.5px; padding: 2px 7px; border-radius: 9px; white-space: nowrap;
  background: color-mix(in srgb, var(--violet) 14%, transparent); color: var(--text-dim); }
.mc-spark { width: 64px; height: 22px; }
.mc-spark polyline { fill: none; stroke: var(--mint); stroke-width: 1.5; stroke-linejoin: round; stroke-linecap: round; }
.mc-spark-empty { width: 64px; }
.mc-delta { font-size: 11px; font-variant-numeric: tabular-nums; white-space: nowrap; }
.mc-delta.up { color: var(--coral); }
.mc-delta.down { color: var(--mint); }
.mc-delta.new { color: var(--amber); }
.mc-total { text-align: right; font-family: var(--font-head); font-weight: 500; font-size: 14px; font-variant-numeric: tabular-nums; }
.mc-count { text-align: right; font-size: 11px; color: var(--text-faint); font-variant-numeric: tabular-nums; }
/* detail */
.mc-back { display: inline-flex; align-items: center; gap: 5px; background: none; border: none; cursor: pointer;
  color: var(--text-dim); font: inherit; font-size: 13px; padding: 2px 0; margin-bottom: 10px; }
.mc-back:hover { color: var(--text); }
.mc-back svg { width: 15px; height: 15px; }
.mc-dhead { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
.mc-dname { font-family: var(--font-head); font-weight: 500; font-size: 20px; margin: 0; word-break: break-word; }
.mc-refile { display: inline-flex; align-items: center; gap: 5px; padding: 7px 12px; border-radius: var(--r-ctrl);
  border: 1px solid var(--hairline); background: var(--card); color: var(--violet); font: inherit; font-size: 12.5px;
  font-weight: 500; cursor: pointer; white-space: nowrap; }
.mc-refile:hover { border-color: var(--violet); }

.mc-bars { display: flex; align-items: flex-end; gap: 6px; height: 96px; padding: 12px 14px 8px; margin-bottom: 14px; }
.mc-bar { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
  height: 100%; gap: 4px; }
.mc-bar-fill { width: 60%; max-width: 22px; border-radius: 4px 4px 0 0;
  background: linear-gradient(to top, color-mix(in srgb, var(--mint) 55%, transparent), var(--mint)); }
.mc-bar-lbl { font-size: 9.5px; color: var(--text-faint); }
.mc-txlist { display: flex; flex-direction: column; border: 1px solid var(--hairline); border-radius: var(--r-card);
  background: var(--card); overflow: hidden; }
.mc-tx { width: 100%; display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 10px;
  padding: 10px 14px; border: none; border-top: 1px solid var(--hairline); background: none; color: var(--text);
  font: inherit; cursor: pointer; text-align: left; }
.mc-tx.wide { grid-template-columns: minmax(0,1.2fr) auto auto auto 16px; }
.mc-tx:first-child { border-top: none; }
.mc-tx:hover { background: color-mix(in srgb, var(--mint) 6%, transparent); }
.mc-tx-name { min-width: 0; font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mc-tx-date { font-size: 11px; color: var(--text-faint); font-variant-numeric: tabular-nums; white-space: nowrap; }
.mc-tx-cat { font-size: 10.5px; padding: 2px 7px; border-radius: 9px; white-space: nowrap;
  background: color-mix(in srgb, var(--violet) 12%, transparent); color: var(--text-dim); }
.mc-tx-cat.off { background: color-mix(in srgb, var(--text-faint) 16%, transparent); }
.mc-tx-amt { text-align: right; font-size: 12.5px; font-variant-numeric: tabular-nums; white-space: nowrap; }
.mc-tx-amt.in { color: var(--mint); }
.mc-tx i { width: 14px; height: 14px; color: var(--text-faint); }

/* ---- reports / budgeting (V2 step 4) ---- */
.rp-catrow, .rp-mrow { grid-template-columns: minmax(0,1.3fr) 64px auto auto auto; }
.rp-avg { text-align: right; font-size: 11px; color: var(--text-faint); font-variant-numeric: tabular-nums; white-space: nowrap; }
.rp-chart { display: flex; align-items: flex-end; gap: 6px; height: 110px; padding: 12px 14px 8px; margin-bottom: 14px; }
.rp-bar { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
  height: 100%; gap: 4px; }
.rp-bar-fill { width: 62%; max-width: 26px; border-radius: 4px 4px 0 0;
  background: linear-gradient(to top, color-mix(in srgb, var(--violet) 45%, transparent), var(--violet)); }
.rp-bar-lbl { font-size: 9.5px; color: var(--text-faint); }
.rp-sec { margin-top: 22px; }
.rp-sec-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
.rp-sec-head h2 { font-family: var(--font-head); font-weight: 500; font-size: 17px; margin: 0; }
.rp-sec-sub { font-size: 12px; color: var(--text-faint); font-variant-numeric: tabular-nums; }
.rp-kill-note { font-size: 12px; margin: 0 0 10px; }
.rp-kill { display: flex; flex-direction: column; border: 1px solid var(--hairline); border-radius: var(--r-card);
  background: var(--card); overflow: hidden; }
.rp-kill-row { display: grid; grid-template-columns: minmax(0,1.2fr) auto auto auto; align-items: center; gap: 10px;
  padding: 10px 14px; border-top: 1px solid var(--hairline); }
.rp-kill-row:first-child { border-top: none; }
.rp-kill-name { min-width: 0; font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rp-kill-cat { font-size: 10.5px; padding: 2px 7px; border-radius: 9px; white-space: nowrap;
  background: color-mix(in srgb, var(--violet) 12%, transparent); color: var(--text-dim); }
.rp-kill-mo { text-align: right; font-size: 11.5px; color: var(--text-faint); font-variant-numeric: tabular-nums; white-space: nowrap; }
.rp-kill-yr { text-align: right; font-family: var(--font-head); font-weight: 500; font-size: 13.5px;
  color: var(--coral); font-variant-numeric: tabular-nums; white-space: nowrap; }
.rp-link { color: var(--violet); font-weight: 600; text-decoration: none; }
.rp-link:hover { text-decoration: underline; }
.rp-kill-chip { margin-left: 7px; font-size: 9.5px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .04em; padding: 1px 6px; border-radius: 8px; vertical-align: middle; }
.rp-kill-chip.kill { color: var(--coral); background: color-mix(in srgb, var(--coral) 16%, transparent); }
.rp-kill-chip.review { color: var(--amber); background: color-mix(in srgb, var(--amber) 16%, transparent); }

/* ---- Analysis screen (V2 step 4) ---- */
.an-hint { font-size: 11.5px; color: var(--text-faint); }
.an-sec { margin-top: 18px; }
.an-sec.muted { opacity: .62; }
.an-sec-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
.an-sec-head h2 { font-family: var(--font-head); font-weight: 500; font-size: 16px; }
.an-sec-tot { font-size: 12px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
.an-list { border: 1px solid var(--hairline); border-radius: var(--r-card); overflow: hidden;
  background: var(--card); box-shadow: var(--card-top), var(--shadow);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
.an-row { display: grid; grid-template-columns: minmax(0,1.3fr) auto minmax(88px,auto) auto;
  align-items: center; gap: 10px; padding: 10px 14px; border-top: 1px solid var(--hairline); }
.an-row:first-child { border-top: none; }
.an-name { min-width: 0; font-size: 13.5px; font-weight: 500; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; text-align: left; }
button.an-name { background: none; border: none; color: var(--text); font: inherit; font-weight: 500;
  cursor: pointer; display: inline-flex; align-items: center; gap: 3px; padding: 0; }
button.an-name i { width: 14px; height: 14px; color: var(--text-faint); }
button.an-name:hover { color: var(--violet); }
.an-chip { font-size: 10px; padding: 2px 7px; border-radius: 9px; white-space: nowrap; color: var(--text-dim);
  background: color-mix(in srgb, var(--violet) 12%, transparent); }
.an-chip.cat { color: var(--blue, var(--violet)); background: color-mix(in srgb, var(--violet) 10%, transparent); }
.an-yr { text-align: right; font-family: var(--font-head); font-weight: 500; font-size: 13.5px;
  font-variant-numeric: tabular-nums; white-space: nowrap; display: flex; flex-direction: column; }
.an-yr small { font-family: var(--font-body); font-weight: 400; font-size: 10.5px; color: var(--text-faint); }
.an-dec { display: inline-flex; border: 1px solid var(--hairline); border-radius: 9px; overflow: hidden; }
.an-decb { background: none; border: none; border-left: 1px solid var(--hairline); color: var(--text-dim);
  font: inherit; font-size: 11px; font-weight: 600; padding: 4px 9px; cursor: pointer; white-space: nowrap; }
.an-decb:first-child { border-left: none; }
.an-decb:hover { color: var(--text); }
.an-decb.on.d-keep { background: color-mix(in srgb, var(--mint) 22%, transparent); color: var(--mint); }
.an-decb.on.d-review { background: color-mix(in srgb, var(--amber) 22%, transparent); color: var(--amber); }
.an-decb.on.d-kill { background: color-mix(in srgb, var(--coral) 22%, transparent); color: var(--coral); }
.an-kept-toggle { display: inline-flex; align-items: center; gap: 6px; background: none; border: none;
  color: var(--text-dim); font: inherit; font-family: var(--font-head); font-weight: 500; font-size: 15px;
  cursor: pointer; padding: 2px 0; }
.an-kept-toggle:hover { color: var(--text); }
.an-kept-toggle i { width: 15px; height: 15px; }
.an-more { font-size: 11.5px; margin-top: 8px; }
@media (max-width: 640px) {
  .an-row { grid-template-columns: minmax(0,1fr) auto; row-gap: 8px; }
  .an-chip { grid-row: 1; }
  .an-yr { grid-column: 1; text-align: left; flex-direction: row; align-items: baseline; gap: 6px; }
  .an-dec { grid-column: 1 / -1; }
  /* Forecast chart uses a narrower/taller viewBox on mobile (see buildChart);
     nudge the SVG label sizes up (viewBox units) for extra legibility. */
  .ax-lbl { font-size: 12px; }
  .ax-lbl.low { font-size: 12.5px; }
  .cf-co-mon { font-size: 11px; }
  .cf-co-val { font-size: 13.5px; }
}
.cat-decision { border: 1px solid var(--hairline); border-radius: 8px; background: var(--card-solid);
  color: var(--text-dim); font: inherit; font-size: 11.5px; padding: 3px 6px; cursor: pointer; }
.cat-decision.d-keep { color: var(--mint); }
.cat-decision.d-review { color: var(--amber); }
.cat-decision.d-kill { color: var(--coral); }

/* ---- detected recurring (Emma phase 1c) ---- */
.rd-body { display: flex; flex-direction: column; gap: 8px; }
.rd-card { display: flex; align-items: center; gap: 12px; padding: 12px 15px;
  background: var(--card); border: 1px solid var(--hairline);
  box-shadow: var(--card-top), var(--shadow); border-radius: var(--r-card);
  border-left: 3px solid color-mix(in srgb, var(--violet) 55%, var(--hairline));
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
.rd-main { flex: 1; min-width: 0; }
.rd-name { font-weight: 600; font-size: 14.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rd-meta { margin-top: 4px; font-size: 12px; color: var(--text-faint); }
.rd-vary { display: inline-flex; align-items: center; gap: 3px; color: var(--amber); }
.rd-vary svg { width: 12px; height: 12px; }
.rd-stale { display: inline-flex; align-items: center; gap: 3px; margin-left: 6px; color: var(--coral); }
.rd-stale svg { width: 12px; height: 12px; }
.rd-card.stale { border-left-color: color-mix(in srgb, var(--coral) 55%, var(--hairline)); opacity: .82; }
.rd-right { display: flex; flex-direction: column; align-items: flex-end; gap: 7px; }
.rd-amt { font-family: var(--font-head); font-weight: 500; font-size: 15px; white-space: nowrap; }
.rd-actions { display: flex; align-items: center; gap: 6px; }
.rd-add { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border-radius: 999px;
  border: none; cursor: pointer; background: var(--mint); color: #06120c;
  font-family: var(--font-body); font-weight: 600; font-size: 12.5px; }
.rd-add svg { width: 13px; height: 13px; }
.rd-dismiss { display: inline-flex; padding: 6px; border-radius: 999px; cursor: pointer;
  border: 1px solid var(--hairline); background: none; color: var(--text-faint); }
.rd-dismiss svg { width: 13px; height: 13px; }
.rd-dismiss:hover { color: var(--coral); border-color: color-mix(in srgb, var(--coral) 40%, var(--hairline)); }
.rd-load { padding: 9px 16px; border-radius: var(--r-ctrl); border: 1px solid var(--hairline);
  background: var(--card); color: var(--text); cursor: pointer; font-family: var(--font-body); }

/* ---- category manager (Emma phase 1d) ---- */
.cat-section { margin-top: 22px; }
.cat-body { display: flex; flex-direction: column; gap: 6px; }
.cat-row { display: flex; align-items: center; gap: 10px; padding: 9px 13px;
  background: var(--card); border: 1px solid var(--hairline); border-radius: var(--r-ctrl); }
.cat-name { flex: 1; min-width: 0; font-size: 14px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cat-tag { font-size: 10.5px; letter-spacing: .04em; text-transform: uppercase; font-weight: 600;
  color: var(--coral); padding: 2px 7px; border-radius: 999px;
  background: color-mix(in srgb, var(--coral) 14%, transparent); }
.cat-tag.dim { color: var(--text-faint); background: none; }
.cat-del { display: inline-flex; padding: 6px; border-radius: 8px; cursor: pointer;
  border: none; background: none; color: var(--text-faint); }
.cat-del:hover { color: var(--coral); }
.cat-del svg { width: 15px; height: 15px; }
.cat-move { display: inline-flex; padding: 6px; border-radius: 8px; cursor: pointer;
  border: none; background: none; color: var(--text-faint); }
.cat-move:hover { color: var(--violet); }
.cat-move svg { width: 15px; height: 15px; }
.cat-add { display: flex; gap: 8px; margin-top: 6px; }
.cat-add .field { flex: 1; }
/* merchant multi-select mover (category Move sheet) */
.pick-head { display: flex; align-items: center; justify-content: space-between;
  margin: 4px 0 8px; }
.pick-count { font-size: 12.5px; color: var(--text-faint); }
.pick-all { border: none; background: none; cursor: pointer; font-size: 12.5px;
  font-weight: 600; color: var(--violet); padding: 2px 4px; }
.pick-list { display: flex; flex-direction: column; gap: 6px;
  max-height: 46vh; overflow-y: auto; }
.pick-row { display: flex; align-items: center; gap: 10px; padding: 8px 11px;
  background: var(--card); border: 1px solid var(--hairline); border-radius: var(--r-ctrl);
  cursor: pointer; }
.pick-row input { width: 17px; height: 17px; accent-color: var(--violet); flex: none; }
.pick-name { flex: 1; min-width: 0; font-size: 13.5px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pick-meta { font-size: 12px; color: var(--text-faint); white-space: nowrap; flex: none; }
.cat-addbtn { display: inline-flex; align-items: center; gap: 4px; padding: 0 15px; border-radius: var(--r-ctrl);
  border: none; cursor: pointer; background: var(--violet); color: #fff;
  font-family: var(--font-body); font-weight: 600; font-size: 13px; white-space: nowrap; }
.cat-addbtn svg { width: 14px; height: 14px; }
.cat-budget { display: flex; align-items: center; flex-wrap: wrap; gap: 8px 12px; margin-top: 10px;
  padding: 11px 13px; border: 1px dashed color-mix(in srgb, var(--violet) 45%, var(--hairline));
  border-radius: var(--r-ctrl); background: color-mix(in srgb, var(--violet) 5%, transparent); }
.cat-blabel { font-size: 13px; font-weight: 600; }
.cat-budget .field { flex: 0 0 120px; }
.cat-bhint { font-size: 11.5px; color: var(--text-faint); }

/* ---- this-month reconciliation (current-month phase) ---- */
.rc-card { padding: 15px 15px 12px; margin-bottom: 14px; }
.rc-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
.rc-body { display: flex; flex-direction: column; gap: 8px; }
.rc-grp { border: 1px solid var(--hairline); border-radius: var(--r-ctrl); background: var(--card); overflow: hidden; }
.rc-ghead { width: 100%; display: flex; align-items: center; gap: 10px;
  padding: 11px 13px; background: none; border: none; cursor: pointer; color: var(--text); text-align: left; }
.rc-gname { flex: 1; min-width: 0; font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rc-gnums, .rc-nums { font-size: 13px; color: var(--text-faint); font-variant-numeric: tabular-nums; white-space: nowrap; }
.rc-exp { color: var(--text-faint); font-weight: 400; }
.rc-bar { height: 5px; margin: 0 13px 10px; border-radius: 999px; background: var(--hairline); overflow: hidden; }
.rc-bar > span { display: block; height: 100%; border-radius: 999px; transition: width var(--dur-2) var(--ease); }
.rc-chev { width: 15px; height: 15px; color: var(--text-faint); flex: none; }
.rc-tag { font-size: 10px; letter-spacing: .04em; text-transform: uppercase; font-weight: 700;
  padding: 2px 7px; border-radius: 999px; white-space: nowrap; flex: none; }
.rc-tag.mint { color: var(--mint); background: color-mix(in srgb, var(--mint) 15%, transparent); }
.rc-tag.amber { color: var(--amber); background: color-mix(in srgb, var(--amber) 16%, transparent); }
.rc-tag.coral { color: var(--coral); background: color-mix(in srgb, var(--coral) 16%, transparent); }
.rc-cats { border-top: 1px solid var(--hairline); background: color-mix(in srgb, var(--text) 2%, transparent); }
.rc-cat + .rc-cat { border-top: 1px solid var(--hairline); }
.rc-crow { display: flex; align-items: center; }
.rc-chead { flex: 1; min-width: 0; display: flex; align-items: center; gap: 9px;
  padding: 9px 13px 9px 22px; background: none; border: none; cursor: pointer; color: var(--text); text-align: left; }
.rc-cname { flex: 1; min-width: 0; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rc-edit { flex: none; display: inline-flex; padding: 5px; margin-right: 8px; border-radius: 7px; border: none; background: none; cursor: pointer;
  color: var(--text-faint); }
.rc-edit:hover { color: var(--violet); }
.rc-edit svg { width: 14px; height: 14px; }
.rc-txs { padding: 2px 13px 8px 30px; display: flex; flex-direction: column; gap: 2px; }
.rc-tx { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: center;
  font-size: 12px; padding: 3px 0; }
.rc-txdate { color: var(--text-faint); font-variant-numeric: tabular-nums; }
.rc-txamt { text-align: right; font-variant-numeric: tabular-nums; }
.rc-retry { margin-left: 8px; text-decoration: underline; background: none; border: none; color: var(--violet); cursor: pointer; }

/* ============================================================= *
 *  Bottom sheet + form controls                                *
 * ============================================================= */
.sheet-overlay {
  position: fixed; inset: 0; z-index: 60; display: flex; align-items: flex-end; justify-content: center;
  background: rgba(0,0,0,.45); opacity: 0; transition: opacity var(--dur-2) var(--ease);
}
.sheet-overlay.in { opacity: 1; }
.sheet {
  width: 100%; max-width: 520px; max-height: 92dvh; overflow-y: auto;
  border-radius: 20px 20px 0 0; padding: 8px 18px calc(22px + env(safe-area-inset-bottom, 0px));
  transform: translateY(24px); transition: transform var(--dur-2) var(--ease);
}
.sheet-overlay.in .sheet { transform: none; }
@media (min-width: 860px) {
  .sheet-overlay { align-items: center; }
  .sheet { border-radius: 20px; max-height: 88dvh; }
}
.sheet-head {
  display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 2;
  padding: 10px 0 12px; margin-bottom: 4px; background: var(--card-solid);
  border-bottom: 1px solid var(--hairline);
}
.sheet-title { flex: 1; text-align: center; font-family: var(--font-head); font-weight: 500; font-size: 16px; }
.sheet-txtbtn {
  background: none; border: none; cursor: pointer; font-family: var(--font-body);
  font-size: 14.5px; font-weight: 500; color: var(--text-dim); padding: 4px 2px;
}
.sheet-txtbtn.primary { color: var(--mint); font-weight: 600; }
.sheet-txtbtn[disabled] { opacity: .5; }
/* ---- Settings page ---- */
.set-card { padding: 16px 16px 18px; margin-bottom: 14px; }
.set-card .eyebrow { display: block; margin-bottom: 12px; }
.set-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.set-field:last-child { margin-bottom: 0; }
.set-label { font-size: 13px; font-weight: 500; color: var(--text-dim); }
.set-inputwrap { position: relative; display: flex; align-items: center; }
.set-inputwrap .field { flex: 1; }
.set-prefix { position: absolute; left: 12px; color: var(--text-faint); font-size: 14px; pointer-events: none; }
.set-inputwrap:has(.set-prefix) .field { padding-left: 26px; }
.set-about { font-size: 13px; color: var(--text-dim); line-height: 1.6; margin: 0; }
.sheet-body { display: flex; flex-direction: column; gap: 14px; padding-top: 8px; }
.fld { display: flex; flex-direction: column; gap: 6px; }
.fld-label { font-size: 12.5px; font-weight: 500; color: var(--text-dim); }
.fld-help { font-size: 11.5px; color: var(--text-faint); }
.fld-row { flex-direction: row; align-items: center; justify-content: space-between; }
select.field { appearance: none; background-image:
  linear-gradient(45deg, transparent 50%, var(--text-dim) 50%), linear-gradient(135deg, var(--text-dim) 50%, transparent 50%);
  background-position: calc(100% - 18px) 55%, calc(100% - 13px) 55%; background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; }
.segmented { display: flex; gap: 4px; background: var(--base); border: 1px solid var(--hairline);
             border-radius: var(--r-ctrl); padding: 3px; }
.seg { flex: 1; padding: 8px 6px; border: none; border-radius: 7px; cursor: pointer;
       background: none; color: var(--text-dim); font-family: var(--font-body); font-weight: 500; font-size: 13px; }
.seg.on { background: var(--card-solid); color: var(--text); box-shadow: var(--shadow); }
.toggle { width: 44px; height: 26px; flex: none; border-radius: 999px; border: none; cursor: pointer;
          background: var(--hairline); position: relative; transition: background var(--dur-1) var(--ease); }
.toggle.on { background: var(--mint); }
.toggle .knob { position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 50%;
                background: #fff; transition: transform var(--dur-1) var(--ease); }
.toggle.on .knob { transform: translateX(18px); }
.impact { display: none; align-items: center; gap: 8px; margin: 14px 0 2px; padding: 11px 13px;
          border-radius: var(--r-ctrl); background: color-mix(in srgb, var(--mint) 10%, transparent);
          border: 1px solid color-mix(in srgb, var(--mint) 22%, transparent);
          color: var(--text); font-size: 13px; }
.impact svg { width: 15px; height: 15px; color: var(--mint); flex: none; }
.sheet-delete { margin-top: 8px; width: 100%; padding: 11px; border-radius: var(--r-ctrl);
                border: 1px solid color-mix(in srgb, var(--coral) 35%, var(--hairline));
                background: none; color: var(--coral); font-family: var(--font-body); font-weight: 600; font-size: 14px; cursor: pointer; }

/* ============================================================= *
 *  Nav groups (sidebar + More drawer) + mobile More drawer      *
 * ============================================================= */
.nav-group { font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase;
             color: var(--text-faint); font-weight: 600; padding: 13px 14px 4px; }
.nav-group.first { padding-top: 2px; }

.drawer { position: fixed; inset: 0; z-index: 40; }
.drawer[hidden] { display: none; }
.drawer-veil { position: absolute; inset: 0; background: rgba(4,6,9,.5);
               opacity: 0; transition: opacity var(--dur-2) var(--ease); }
.drawer.open .drawer-veil { opacity: 1; }
.drawer-sheet {
  position: absolute; left: 0; right: 0; bottom: 0; background: var(--card-solid);
  border-top: 1px solid var(--hairline); border-radius: 20px 20px 0 0;
  padding: 10px 14px calc(18px + env(safe-area-inset-bottom, 0px));
  box-shadow: 0 -14px 40px rgba(0,0,0,.4); max-height: 82vh; overflow: auto;
  transform: translateY(100%); transition: transform var(--dur-2) var(--ease);
}
.drawer.open .drawer-sheet { transform: none; }
.drawer-grip { width: 36px; height: 4px; border-radius: 2px; background: var(--hairline); margin: 2px auto 8px; }
@media (min-width: 860px) { .drawer { display: none; } }

/* ============================================================= *
 *  Home dashboard — three equal pillars                         *
 * ============================================================= */
.hp-greet { font-family: var(--font-head); font-weight: 500; font-size: 22px;
            letter-spacing: -.01em; margin: 2px 0 14px; }
.hp-pillar { padding: 15px 16px; margin-bottom: 14px; cursor: pointer; }
.hp-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.hp-meta { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-dim); }
.hp-meta svg { width: 15px; height: 15px; }
.hp-big { font-family: var(--font-head); font-weight: 500; font-size: 27px;
          letter-spacing: -.01em; font-variant-numeric: tabular-nums; }
.hp-big .of { font-size: 16px; color: var(--text-dim); }
.hp-spark { width: 100%; height: 40px; margin: 8px 0 2px; display: block; }
.hp-sub { font-size: 12.5px; color: var(--text-dim); margin-top: 6px; }
.hp-sub .neg { color: var(--coral); }
.hp-bar { height: 7px; border-radius: 5px; background: var(--hairline); overflow: hidden; margin-top: 9px; }
.hp-bar > i { display: block; height: 100%; border-radius: 5px; background: var(--mint); }
.hp-bar.blue > i { background: var(--blue); }
.hp-load { font-size: 12px; color: var(--amber); }

/* ---- "This month" strip (actual-vs-forecast) ---- */
.hp-ms { padding: 14px 16px; margin-bottom: 14px; cursor: pointer; }
.hp-ms-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
.hp-ms-big { font-family: var(--font-head); font-weight: 500; font-size: 25px;
             letter-spacing: -.01em; font-variant-numeric: tabular-nums; }
.hp-ms-big .pos { color: var(--mint); }
.hp-ms-big .neg { color: var(--coral); }
.hp-ms-big .of { font-size: 14px; color: var(--text-dim); font-family: var(--font-body); }
.hp-ms-sub { font-size: 12.5px; color: var(--text-dim); margin-top: 5px; }
.hp-ms-tag { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px;
             text-transform: lowercase; letter-spacing: .01em; }
.hp-ms-tag.mint { color: var(--mint); background: color-mix(in srgb, var(--mint) 15%, transparent); }
.hp-ms-tag.amber { color: var(--amber); background: color-mix(in srgb, var(--amber) 15%, transparent); }
.hp-ms-tag.coral { color: var(--coral); background: color-mix(in srgb, var(--coral) 15%, transparent); }

/* ---- "needs a category" action card ---- */
.hp-uc { padding: 14px 15px; margin-bottom: 14px; }
.hp-uc-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
.hp-uc-title { font-family: var(--font-head); font-size: 15px; }
.hp-uc-sub { font-size: 12.5px; color: var(--text-faint); margin-top: 2px; }
.hp-uc-badge { flex: none; min-width: 26px; height: 26px; padding: 0 8px; border-radius: 13px;
               display: inline-flex; align-items: center; justify-content: center; font-size: 13px;
               font-weight: 600; color: var(--amber); background: color-mix(in srgb, var(--amber) 16%, transparent); }
.hp-uc-row { display: flex; align-items: stretch; gap: 6px; margin-top: 6px; }
.hp-uc-open { flex: 1; min-width: 0; display: flex; align-items: center; gap: 10px; padding: 9px 11px;
             border-radius: 10px; background: var(--surface-2); border: 1px solid var(--hairline); cursor: pointer; }
.hp-uc-name { flex: 1; min-width: 0; font-size: 13.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hp-uc-meta { font-size: 12.5px; color: var(--text-faint); white-space: nowrap; flex: none; }
.hp-uc-accept { flex: none; max-width: 46%; display: inline-flex; align-items: center; gap: 5px; padding: 0 11px;
               border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600;
               color: var(--mint); background: color-mix(in srgb, var(--mint) 14%, transparent);
               border: 1px solid color-mix(in srgb, var(--mint) 35%, transparent); }
.hp-uc-accept i { width: 15px; height: 15px; flex: none; }
.hp-uc-accept span { min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hp-uc-accept:disabled { opacity: .5; }
.hp-uc-all { display: flex; align-items: center; justify-content: center; gap: 4px; width: 100%;
             margin-top: 10px; padding: 8px; border-radius: 10px; cursor: pointer;
             font-size: 12.5px; color: var(--text-dim); background: none; border: none; }
.hp-uc-all i { width: 15px; height: 15px; }

/* ---- Project detail page (#/projects/:id) ---- */
.pd-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
.pd-back, .pd-edit { flex: none; width: 38px; height: 38px; border-radius: 11px;
  display: grid; place-items: center; background: var(--card); border: 1px solid var(--hairline);
  color: var(--text-dim); cursor: pointer; transition: color var(--dur-1) var(--ease), border-color var(--dur-1) var(--ease); }
.pd-back:hover, .pd-edit:hover { color: var(--text); border-color: var(--text-faint); }
.pd-back svg, .pd-edit svg { width: 18px; height: 18px; }
.pd-title { flex: 1 1 auto; min-width: 0; }
.pd-name { font-family: var(--font-head); font-weight: 500; font-size: 24px; line-height: 1.15; margin: 2px 0 6px; }
.pd-meta { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; font-size: 13px; }

.pd-tiles { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 18px; }
.pd-tile { padding: 13px 14px; border-radius: 14px; background: var(--card);
  border: 1px solid var(--hairline); box-shadow: var(--card-top), var(--shadow); }
.pd-tl { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-faint); margin-bottom: 4px; }
.pd-tv { font-family: var(--font-head); font-weight: 500; font-size: 20px; font-variant-numeric: tabular-nums; }
.pd-afftile { grid-column: 1 / -1; }
.pd-aff { display: flex; align-items: center; gap: 7px; font-size: 14px; font-weight: 500; }
.pd-aff svg { width: 17px; height: 17px; }

.pd-sec { margin-top: 22px; }
.pd-sechead { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
.pd-leg { font-size: 11.5px; color: var(--text-faint); display: flex; align-items: center; gap: 5px; }
.pd-sw { display: inline-block; width: 10px; height: 10px; border-radius: 3px; }
.pd-sw.pl { background: color-mix(in srgb, var(--blue) 45%, transparent); }
.pd-sw.ac { background: var(--mint); }

.pd-track { display: flex; flex-direction: column; gap: 11px; }
.pd-mrow { }
.pd-mtop { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
.pd-mo { font-size: 13px; font-weight: 500; }
.pd-mnums { font-size: 12.5px; font-variant-numeric: tabular-nums; color: var(--text-dim); display: flex; gap: 8px; }
.pd-pl { color: var(--text-dim); }
.pd-mbar { position: relative; height: 8px; border-radius: 5px; background: var(--hairline); overflow: hidden; }
.pd-mbar-pl { position: absolute; inset: 0 auto 0 0; height: 100%;
  background: color-mix(in srgb, var(--blue) 40%, transparent); border-radius: 5px; }
.pd-mbar-ac { position: absolute; inset: 0 auto 0 0; height: 100%; background: var(--mint); border-radius: 5px; }
.pd-mbar-ac.over { background: var(--coral); }
.pd-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.pd-chip { font-size: 11.5px; padding: 2px 8px; border-radius: 999px;
  background: color-mix(in srgb, var(--violet) 15%, transparent); color: var(--violet); }

.pd-pays { display: flex; flex-direction: column; }
.pd-pay { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--hairline); }
.pd-pay:last-child { border-bottom: none; }
.pd-pay-main { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
.pd-pay-name { font-size: 13.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pd-pay-item { font-size: 11.5px; color: var(--text-faint); }
.pd-pay-date { font-size: 12px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
.pd-pay-amt { font-size: 13.5px; font-weight: 600; font-variant-numeric: tabular-nums; }

@media (min-width: 720px) { .pd-tiles { grid-template-columns: repeat(4, 1fr); } .pd-afftile { grid-column: auto; } }
</style>
</head>
<body>

<!-- Aurora backdrop -->
<div class="aurora" aria-hidden="true">
  <div class="blob mint"></div>
  <div class="blob violet"></div>
  <div class="blob blue"></div>
  <div class="contour"></div>
</div>

<!-- ============ Auth gate ============ -->
<div id="gate">
  <div class="authcard glass">
    <div class="wordmark" style="font-size:24px; margin-bottom:6px;">Household<span class="accent">·</span>Planner</div>
    <p class="muted" style="margin:0 0 6px;">Can we afford to start that project, given everything else going on?</p>
    <form id="authForm">
      <input id="email" class="field" type="email" inputmode="email" autocomplete="email"
             placeholder="you@email.com" required />
      <input id="password" class="field" type="password" autocomplete="current-password"
             placeholder="Password" required />
      <button id="authBtn" class="btn" type="submit">Sign in</button>
    </form>
    <p id="authMsg" class="muted" style="margin-top:14px; min-height:20px;"></p>
  </div>
</div>

<!-- ============ App ============ -->
<div id="app" hidden>
  <header class="appbar">
    <div class="wordmark" style="flex:1;">Household<span class="accent">·</span>Planner</div>
    <button class="iconbtn" id="themeBtn" title="Toggle theme"><i data-lucide="moon"></i></button>
    <button class="iconbtn" id="signoutBtn" title="Sign out"><i data-lucide="log-out"></i></button>
  </header>

  <div class="shell">
    <!-- desktop sidebar -->
    <nav class="sidebar" id="sidebar"></nav>

    <main>
      <!-- Home -->
      <section class="screen active" data-screen="home">
        <div id="home-root"></div>
      </section>

      <!-- Forecast -->
      <section class="screen" data-screen="forecast">
        <div id="forecast-root"></div>
      </section>

      <!-- Spending -->
      <section class="screen" data-screen="spending">
        <div id="spending-root"></div>
      </section>

      <!-- Projects -->
      <section class="screen" data-screen="projects">
        <div id="projects-root"></div>
      </section>

      <!-- Project detail (routed #/projects/:id) -->
      <section class="screen" data-screen="project-detail">
        <div id="project-detail-root"></div>
      </section>

      <!-- Reports -->
      <section class="screen" data-screen="reports">
        <div id="reports-root"></div>
      </section>

      <!-- Analysis -->
      <section class="screen" data-screen="analysis">
        <div id="analysis-root"></div>
      </section>

      <!-- Merchants -->
      <section class="screen" data-screen="merchants">
        <div id="merchants-root"></div>
      </section>

      <!-- Finances -->
      <section class="screen" data-screen="finances">
        <div id="finances-root"></div>
      </section>

      <!-- Categories -->
      <section class="screen" data-screen="categories">
        <div id="categories-root"></div>
      </section>

      <!-- Settings -->
      <section class="screen" data-screen="settings">
        <div id="settings-root"></div>
      </section>
    </main>
  </div>

  <!-- bottom nav (mobile) -->
  <nav class="bottomnav" id="bottomnav"></nav>

  <!-- More drawer (mobile) — the grouped menu -->
  <div class="drawer" id="moredrawer" hidden>
    <div class="drawer-veil"></div>
    <div class="drawer-sheet">
      <div class="drawer-grip"></div>
      <nav id="drawer-list"></nav>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
